name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  ECR_REPO: genre-tagging
  CONTAINER_NAME: genre-tagging

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # image_uri output removed — not consumed by deploy job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${ECR_REGISTRY}/${ECR_REPO}:latest"
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"
          echo "Build complete: ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # ── Memory diagnostics ──
            # t3.micro has 1GB RAM — log available memory before we start.
            echo "=== Pre-deploy memory status ==="
            free -m
            echo ""

            # Ensure swap is active (setup-swap.sh should have run once)
            if ! swapon --show | grep -q '/swapfile'; then
              echo "WARNING: No swap detected — deploy may fail under memory pressure"
            fi

            # Clean up dangling images BEFORE pulling to free memory/disk
            echo "Pruning unused Docker resources..."
            docker image prune -f
            docker container prune -f

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Pull latest image
            IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/genre-tagging:latest"
            docker pull "${IMAGE}"

            # ── Blue-green deploy: test new image before swapping ──
            # Start a canary container on a temp port to verify it boots healthy.
            # The old container keeps running and serving traffic throughout.
            # If the canary fails, the old container is untouched — site stays up.
            # Memory limit: cap at 512MB to prevent OOM-killing the host.

            echo ""
            echo "=== Pre-canary memory status ==="
            free -m
            echo ""

            echo "Starting canary container for health check..."
            docker stop genre-tagging-canary 2>/dev/null || true
            docker rm genre-tagging-canary 2>/dev/null || true

            docker run -d \
              --name genre-tagging-canary \
              --memory=512m \
              --memory-swap=768m \
              -p 127.0.0.1:5002:5001 \
              --env-file /data/genre-tagging/.env \
              -v /data/genre-tagging/output:/app/output \
              -v /data/genre-tagging/config.json:/app/config.json:ro \
              "${IMAGE}"

            # Wait for canary to be ready (up to 2 minutes).
            # /ready triggers lazy init and returns "ready" once complete.
            CANARY_OK=false
            for i in $(seq 1 24); do
              READY=$(curl -sf http://127.0.0.1:5002/ready 2>/dev/null || echo "not ready")
              echo "  Canary attempt $i: $READY"
              if [ "$READY" = "ready" ]; then
                CANARY_OK=true
                break
              fi
              sleep 5
            done

            # ── Canary failed: roll back ──
            if [ "$CANARY_OK" = "false" ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOY ABORTED — old container still running"
              echo "=========================================="
              echo ""
              echo "Canary logs:"
              docker logs genre-tagging-canary --tail 40
              echo ""
              echo "Memory at failure:"
              free -m
              docker stop genre-tagging-canary 2>/dev/null || true
              docker rm genre-tagging-canary 2>/dev/null || true
              exit 1
            fi

            # ── Canary passed: swap in the new container ──
            # CRITICAL: stop canary FIRST to free memory before starting production.
            echo "Canary healthy — stopping canary to free memory..."
            docker stop genre-tagging-canary 2>/dev/null || true
            docker rm genre-tagging-canary 2>/dev/null || true

            # Brief pause to let kernel reclaim memory
            sleep 2

            echo "Stopping old production container..."
            docker stop genre-tagging 2>/dev/null || true
            docker rm genre-tagging 2>/dev/null || true

            echo ""
            echo "=== Pre-production memory status ==="
            free -m
            echo ""

            echo "Starting new production container..."
            docker run -d \
              --name genre-tagging \
              --restart unless-stopped \
              --memory=768m \
              --memory-swap=1g \
              -p 127.0.0.1:5001:5001 \
              --env-file /data/genre-tagging/.env \
              -v /data/genre-tagging/output:/app/output \
              -v /data/genre-tagging/config.json:/app/config.json:ro \
              "${IMAGE}"

            # Verify production container is ready (not just alive).
            # Image is already proven by canary, but confirm init completes.
            # Give it up to 3 minutes (36 × 5s) — more generous than before.
            echo "Verifying production container..."
            PROD_READY=false
            for i in $(seq 1 36); do
              READY=$(curl -sf http://127.0.0.1:5001/ready 2>/dev/null || echo "not ready")
              echo "  Verify attempt $i: $READY"
              if [ "$READY" = "ready" ]; then
                PROD_READY=true
                break
              fi
              sleep 5
            done
            if [ "$PROD_READY" = "true" ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOY SUCCESSFUL"
              echo "=========================================="
            else
              echo ""
              echo "=========================================="
              echo "WARNING: Production container not ready after 3 min"
              echo "=========================================="
              echo ""
              echo "Container logs:"
              docker logs genre-tagging --tail 40
              echo ""
              echo "Memory status:"
              free -m
              # Don't exit 1 here — the canary proved the image works.
              # The container will likely finish init shortly.
            fi

            # Final cleanup
            docker image prune -f
            echo ""
            echo "=== Post-deploy memory status ==="
            free -m

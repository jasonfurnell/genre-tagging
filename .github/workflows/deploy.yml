name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  ECR_REPO: genre-tagging
  CONTAINER_NAME: genre-tagging

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # image_uri output removed — not consumed by deploy job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${ECR_REGISTRY}/${ECR_REPO}:latest"
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"
          echo "Build complete: ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Pull latest image
            IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/genre-tagging:latest"
            docker pull "${IMAGE}"

            # ── Blue-green deploy: test new image before swapping ──
            # Start a canary container on a temp port to verify it boots healthy.
            # The old container keeps running and serving traffic throughout.
            # If the canary fails, the old container is untouched — site stays up.

            echo "Starting canary container for health check..."
            docker stop genre-tagging-canary 2>/dev/null || true
            docker rm genre-tagging-canary 2>/dev/null || true

            docker run -d \
              --name genre-tagging-canary \
              -p 127.0.0.1:5002:5001 \
              --env-file /data/genre-tagging/.env \
              -v /data/genre-tagging/output:/app/output \
              -v /data/genre-tagging/config.json:/app/config.json:ro \
              "${IMAGE}"

            # Wait for canary to pass its Docker health check (up to 2 minutes)
            CANARY_OK=false
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' genre-tagging-canary 2>/dev/null || echo "starting")
              echo "  Canary attempt $i: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                CANARY_OK=true
                break
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "Canary went unhealthy — aborting deploy"
                break
              fi
              sleep 5
            done

            # ── Canary failed: roll back ──
            if [ "$CANARY_OK" = "false" ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOY ABORTED — old container still running"
              echo "=========================================="
              echo ""
              echo "Canary logs:"
              docker logs genre-tagging-canary --tail 30
              docker stop genre-tagging-canary 2>/dev/null || true
              docker rm genre-tagging-canary 2>/dev/null || true
              exit 1
            fi

            # ── Canary passed: swap in the new container ──
            echo "Canary healthy — swapping containers..."
            docker stop genre-tagging-canary 2>/dev/null || true
            docker rm genre-tagging-canary 2>/dev/null || true

            docker stop genre-tagging 2>/dev/null || true
            docker rm genre-tagging 2>/dev/null || true

            docker run -d \
              --name genre-tagging \
              --restart unless-stopped \
              -p 127.0.0.1:5001:5001 \
              --env-file /data/genre-tagging/.env \
              -v /data/genre-tagging/output:/app/output \
              -v /data/genre-tagging/config.json:/app/config.json:ro \
              "${IMAGE}"

            # Quick verification — image is already proven, just confirm it starts
            echo "Verifying production container..."
            sleep 15
            PROD_STATUS=$(docker inspect --format='{{.State.Health.Status}}' genre-tagging 2>/dev/null || echo "unknown")
            echo "  Production status: $PROD_STATUS"
            if [ "$PROD_STATUS" = "unhealthy" ]; then
              echo "WARNING: Production container unhealthy after swap (canary was fine — likely transient)"
              docker logs genre-tagging --tail 20
            else
              echo "Deploy successful"
            fi

            # Clean up old images
            docker image prune -f

name: Deploy to AWS

on:
  workflow_dispatch:    # Manual "Deploy" button in GitHub Actions
  # Removed auto-deploy on push to main — this was causing repeated
  # outages because every commit (even typo fixes) triggered the full
  # Docker build + blue-green deploy cycle on a memory-constrained host.

env:
  ECR_REPO: genre-tagging
  CONTAINER_NAME: genre-tagging

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # image_uri output removed — not consumed by deploy job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${ECR_REGISTRY}/${ECR_REPO}:latest"
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"
          echo "Build complete: ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # ── Ensure SSM Agent is installed and running (idempotent) ──
            if ! systemctl is-active --quiet amazon-ssm-agent 2>/dev/null; then
              echo "Installing/starting SSM Agent for Session Manager access..."
              sudo dnf install -y amazon-ssm-agent || sudo yum install -y amazon-ssm-agent || true
              sudo systemctl enable amazon-ssm-agent 2>/dev/null || true
              sudo systemctl restart amazon-ssm-agent 2>/dev/null || true
              sleep 5
              # Log status and recent journal for debugging
              echo "SSM Agent status:"
              sudo systemctl status amazon-ssm-agent --no-pager 2>&1 | head -10 || true
              echo "SSM Agent recent logs:"
              sudo journalctl -u amazon-ssm-agent --no-pager -n 20 2>&1 || true
            fi

            # ── Ensure EC2 Instance Connect works (idempotent) ──
            sudo dnf install -y ec2-instance-connect || sudo yum install -y ec2-instance-connect || true
            # Always ensure sshd has the AuthorizedKeysCommand config loaded
            if grep -q 'AuthorizedKeysCommand.*eic_' /etc/ssh/sshd_config 2>/dev/null || \
               grep -rq 'AuthorizedKeysCommand.*eic_' /etc/ssh/sshd_config.d/ 2>/dev/null; then
              echo "EC2 Instance Connect config found in sshd"
            else
              echo "WARNING: EC2 Instance Connect AuthorizedKeysCommand not found in sshd config"
            fi
            sudo systemctl restart sshd 2>/dev/null || true

            # ── Memory diagnostics ──
            # t3.small has 2GB RAM + 1GB swap — log available memory before we start.
            echo "=== Pre-deploy memory status ==="
            free -m
            echo ""

            # Ensure swap is active (setup-swap.sh should have run once)
            if ! swapon --show | grep -q '/swapfile'; then
              echo "WARNING: No swap detected — deploy may fail under memory pressure"
            fi

            # Clean up dangling images BEFORE pulling to free memory/disk
            echo "Pruning unused Docker resources..."
            docker image prune -f
            docker container prune -f

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Pull latest image
            IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/genre-tagging:latest"
            docker pull "${IMAGE}"

            # ── Blue-green deploy: test new image before swapping ──
            # Start a canary container on a temp port to verify it boots healthy.
            # The old container keeps running and serving traffic throughout.
            # If the canary fails, the old container is untouched — site stays up.
            # Memory limit: cap at 512MB to prevent OOM-killing the host.

            echo ""
            echo "=== Pre-canary memory status ==="
            free -m
            echo ""

            echo "Starting canary container for health check..."
            docker stop genre-tagging-canary 2>/dev/null || true
            docker rm genre-tagging-canary 2>/dev/null || true

            docker run -d \
              --name genre-tagging-canary \
              --memory=512m \
              --memory-swap=768m \
              -p 127.0.0.1:5002:5001 \
              --env-file /data/genre-tagging/.env \
              -v /data/genre-tagging/output:/app/output \
              -v /data/genre-tagging/config.json:/app/config.json:ro \
              "${IMAGE}"

            # Wait for canary to be ready (up to 2 minutes).
            # /ready triggers lazy init and returns "ready" once complete.
            CANARY_OK=false
            for i in $(seq 1 24); do
              READY=$(curl -sf http://127.0.0.1:5002/ready 2>/dev/null || echo "not ready")
              echo "  Canary attempt $i: $READY"
              if [ "$READY" = "ready" ]; then
                CANARY_OK=true
                break
              fi
              sleep 5
            done

            # ── Canary failed: roll back ──
            if [ "$CANARY_OK" = "false" ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOY ABORTED — old container still running"
              echo "=========================================="
              echo ""
              echo "Canary logs:"
              docker logs genre-tagging-canary --tail 40
              echo ""
              echo "Memory at failure:"
              free -m
              docker stop genre-tagging-canary 2>/dev/null || true
              docker rm genre-tagging-canary 2>/dev/null || true
              exit 1
            fi

            # ── Canary passed: promote canary to production ──
            # Strategy: the canary is already running and proven healthy on port 5002.
            # We rename it to production and rebind to port 5001. This minimizes the
            # downtime window to just the stop-old + start-new swap (~2-5 seconds).
            #
            # If the new production container fails to start, we attempt to restart
            # the OLD image as a fallback so the site isn't left completely down.

            echo "Canary healthy — promoting to production..."

            # Save the old image ID for emergency rollback
            OLD_IMAGE=$(docker inspect --format='{{.Config.Image}}' genre-tagging 2>/dev/null || echo "")
            echo "Old production image: ${OLD_IMAGE:-none}"

            # Stop canary to free memory and release port 5002
            docker stop genre-tagging-canary 2>/dev/null || true
            docker rm genre-tagging-canary 2>/dev/null || true

            # Brief pause to let kernel reclaim memory
            sleep 2

            echo ""
            echo "=== Pre-swap memory status ==="
            free -m
            echo ""

            # ── Fast swap: stop old, start new ──
            # This is the only downtime window (~2-5 seconds)
            echo "Stopping old production container..."
            docker stop genre-tagging 2>/dev/null || true
            docker rm genre-tagging 2>/dev/null || true

            echo "Starting new production container..."
            docker run -d \
              --name genre-tagging \
              --restart unless-stopped \
              --memory=768m \
              --memory-swap=1g \
              -p 127.0.0.1:5001:5001 \
              --env-file /data/genre-tagging/.env \
              -v /data/genre-tagging/output:/app/output \
              -v /data/genre-tagging/config.json:/app/config.json:ro \
              "${IMAGE}"

            # Verify production container is ready.
            # Image is already proven by canary, so this should be fast.
            # Give it up to 3 minutes (36 × 5s) just in case.
            echo "Verifying production container..."
            PROD_READY=false
            for i in $(seq 1 36); do
              READY=$(curl -sf http://127.0.0.1:5001/ready 2>/dev/null || echo "not ready")
              echo "  Verify attempt $i: $READY"
              if [ "$READY" = "ready" ]; then
                PROD_READY=true
                break
              fi
              sleep 5
            done

            if [ "$PROD_READY" = "true" ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOY SUCCESSFUL"
              echo "=========================================="
            else
              echo ""
              echo "=========================================="
              echo "DEPLOY FAILED: Production container not ready after 3 min"
              echo "=========================================="
              echo ""
              echo "Container logs:"
              docker logs genre-tagging --tail 40
              echo ""
              echo "Memory status:"
              free -m

              # ── Emergency rollback: try to restart the old image ──
              if [ -n "$OLD_IMAGE" ]; then
                echo ""
                echo "Attempting emergency rollback to previous image..."
                docker stop genre-tagging 2>/dev/null || true
                docker rm genre-tagging 2>/dev/null || true
                docker run -d \
                  --name genre-tagging \
                  --restart unless-stopped \
                  --memory=768m \
                  --memory-swap=1g \
                  -p 127.0.0.1:5001:5001 \
                  --env-file /data/genre-tagging/.env \
                  -v /data/genre-tagging/output:/app/output \
                  -v /data/genre-tagging/config.json:/app/config.json:ro \
                  "${OLD_IMAGE}"
                echo "Rollback container started — waiting 60s for /ready..."
                for i in $(seq 1 12); do
                  READY=$(curl -sf http://127.0.0.1:5001/ready 2>/dev/null || echo "not ready")
                  echo "  Rollback attempt $i: $READY"
                  if [ "$READY" = "ready" ]; then
                    echo "ROLLBACK SUCCESSFUL — site is up on previous version"
                    break
                  fi
                  sleep 5
                done
              fi

              exit 1
            fi

            # Final cleanup
            docker image prune -f
            echo ""
            echo "=== Post-deploy memory status ==="
            free -m
